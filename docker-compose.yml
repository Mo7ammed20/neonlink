version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neonlink_app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://neonlink:neonlink_pass@db:5432/neonlink
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - neonlink_net

  db:
    image: postgres:16-alpine
    container_name: neonlink_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: neonlink
      POSTGRES_USER: neonlink
      POSTGRES_PASSWORD: neonlink_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U neonlink -d neonlink']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neonlink_net

  redis:
    image: redis:7-alpine
    container_name: neonlink_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neonlink_net

volumes:
  postgres_data:
  redis_data:

networks:
  neonlink_net:
    driver: bridge
